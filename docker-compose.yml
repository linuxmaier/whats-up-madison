services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: whatsup
      POSTGRES_USER: whatsup
      POSTGRES_PASSWORD: whatsup
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsup"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://whatsup:whatsup@db:5432/whatsup
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
